- schedule: '* * * * 7'
- query: 'select codcoligada, codigo, nome, numpontos, cbo, cargo, inativa, ativtransp,
    descricao, faixasalarial, limitefunc, verbaquadrovagas, percquadrovagas, dataultimarevisao,
    numrevisao, cbo2002, codtabela, codperfilcand, id, benefpontos, objetivo, descricaoppp,
    exibeorganograma, codfuncaochefia, jornadaref, reccreatedby, reccreatedon, recmodifiedby,
    recmodifiedon, codtipofuncao, sigla, codclassfuncao, esocialfuncaoconf, similaridadeintegracaogupy
    from dbo.pfuncao '
- filter_full: ''
- filter_partial: where recmodifiedon >= dateadd(day, -1, getdate())
- delete_full: ''
- delete_partial: ''
