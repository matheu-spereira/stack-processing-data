delta:
- tablename: dim_pessoa
- query: " select 
ppessoa.codigo as id_pessoa,
ppessoa.nome as nm_pessoa,
ppessoa.cep as nr_cep,
ppessoa.cpf as nr_cpf,
ppessoa.naturalidade as ds_naturalidade,
pcodsexo.descricao as ds_sexo,
ppessoa.email as ds_email,
ppessoa.telefone1 as nr_telefone1,
ppessoa.telefone2 as nr_telefone2,
pcodinstrucao.descricao as ds_grau_instrucao 
from ppessoa 
left join pcodsexo on ppessoa.sexo = pcodsexo.codcliente 
left join pcodinstrucao on ppessoa.grauinstrucao = pcodinstrucao.codcliente "
