- query: |
    SELECT
        sp.cd AS codigo,
        g.demanda_formacao,
        g.grande_grupo,
        sp.TITULO AS subgrupo_principal,
        g.subgrupo,
        g.familia,
        g.ocupacao,
        'SUBGRUPO PRINCIPAL' AS nivel,
        g.industrial_uniepro
