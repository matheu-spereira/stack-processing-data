    cr.codigoitemcontabil,
    itemcontabil.iditemcontabil,
    itemcontabil.nmitemcontabil,
    itemcontabil.iditemcontabilsuperior,
    itemcontabil.codigotipoitemcontabil 
    from itemcontabil 
    inner join cr on cr.codigoitemcontabil = itemcontabil.codigo and cr.dataexclusao is null 
    inner join centrocusto on centrocusto.Codigo = cr.CodigoCentroCusto
